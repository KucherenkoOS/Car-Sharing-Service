spring.application.name=Car-Sharing-Service

spring.datasource.url=${MYSQLDB_DATASOURCE_URL}
spring.datasource.username=${MYSQLDB_ROOT_USER}
spring.datasource.password=${MYSQLDB_ROOT_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
springdoc.api-docs.version=openapi_3_0

jwt.expiration=${JWT_EXPIRATION}
jwt.secret=${JWT_SECRET_KEY}

telegram.bot.token=${TELEGRAM_BOT_TOKEN}
telegram.bot.chat-id=${TELEGRAM_ADMIN_CHAT_ID}

stripe.secret.key=${STRIPE_SECRET_KEY}
stripe.success.url=${STRIPE_SUCCESS_URL}
stripe.cancel.url=${STRIPE_CANCEL_URL}
