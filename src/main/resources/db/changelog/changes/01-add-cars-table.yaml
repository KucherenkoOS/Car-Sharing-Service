databaseChangeLog:
  - changeSet:
      id: add-cars-table
      author: KucherenkoOS
      changes:
        - createTable:
            tableName: cars
            columns:

              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_cars
                    nullable: false

              - column:
                  name: model
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: brand
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: car_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false

              - column:
                  name: inventory
                  type: INT
                  constraints:
                    nullable: false

              - column:
                  name: daily_fee
                  type: DECIMAL(10,2)
                  constraints:
                    nullable: false

              - column:
                  name: is_deleted
                  type: bit
                  defaultValueBoolean: false
                  constraints:
                    nullable: false