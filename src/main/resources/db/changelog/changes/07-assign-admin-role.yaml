databaseChangeLog:
  - changeSet:
      id: assign-admin-role
      author: KucherenkoOS
      changes:
        - insert:
            tableName: users_roles
            columns:
              - column:
                  name: user_id
                  valueComputed: (SELECT id FROM users WHERE email='admin@admin.com')

              - column:
                  name: role_id
                  valueComputed: (SELECT id FROM roles WHERE name='ROLE_MANAGER')