databaseChangeLog:
  - changeSet:
      id: add-rental-table
      author: KucherenkoOS
      changes:
        - createTable:
            tableName: rentals
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_rentals
                    nullable: false

              - column:
                  name: rental_date
                  type: date
                  constraints:
                    nullable: false

              - column:
                  name: return_date
                  type: date
                  constraints:
                    nullable: false

              - column:
                  name: actual_return_date
                  type: date
                  constraints:
                    nullable: true

              - column:
                  name: car_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_rentals_cars
                    referencedTableName: cars
                    referencedColumnNames: id

              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_rentals_users
                    referencedTableName: users
                    referencedColumnNames: id

              - column:
                  name: is_deleted
                  type: bit
                  defaultValueBoolean: false
                  constraints:
                    nullable: false