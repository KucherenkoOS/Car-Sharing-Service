databaseChangeLog:
  - changeSet:
      id: add-payments-table
      author: KucherenkoOS
      changes:
        - createTable:
            tableName: payments
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_payments
                    nullable: false

              - column:
                  name: rental_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_payments_rentals
                    references: rentals(id)

              - column:
                  name: session_url
                  type: VARCHAR(2048)
                  constraints:
                    nullable: false

              - column:
                  name: session_id
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: total
                  type: DECIMAL(20, 2)
                  constraints:
                    nullable: false

              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: "PENDING"
                  constraints:
                    nullable: false

              - column:
                  name: type
                  type: VARCHAR(20)
                  defaultValue: "PAYMENT"
                  constraints:
                    nullable: false

              - column:
                  name: is_deleted
                  type: bit
                  defaultValueBoolean: false
                  constraints:
                    nullable: false